server:
  port: 8082 # Each microservice must have a different number here!

spring:
  application:
    name: payment-service
  datasource:
    # Uses Cloud environment variables if present, otherwise falls back to your local setup
    url: ${DB_URL:jdbc:postgresql://localhost:3030/payments-db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 🚀 MOVE BACK TO THIS EXACT ALIGNMENT (2 spaces out from the left edge):
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.foodapp.Order.Service.dto,com.foodapp.Payment.Service.dto"

    # 🚀 PRODUCER CONFIGURATION ADDED:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
