# Step 1: Build the application using Maven
FROM maven:3.9-eclipse-temurin-17 AS build
WORKDIR /app
  
  # Copy the pom.xml and source code into the container
COPY pom.xml .
COPY src ./src
  
  # Compile and package the application into a runnable JAR file
RUN mvn clean package -DskipTests
  
  # Step 2: Create a lightweight runtime image to execute the application
FROM eclipse-temurin:17-jre-alpine
WORKDIR /app
  
  # Copy the compiled JAR file from the build step into the runtime step
COPY --from=build /app/target/*.jar app.jar
  
  # Expose port 8080 (Cloud Run's default routing port)
EXPOSE 8080
  
  # Run the Spring Boot application when the container starts
ENTRYPOINT ["java", "-jar", "app.jar"]
