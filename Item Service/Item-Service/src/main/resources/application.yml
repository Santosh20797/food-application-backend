server:
  port: 8084

spring:
  application:
    name: item-service
  datasource:
    url: jdbc:postgresql://localhost:3030/item-db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  pre-loading-enabled: false
